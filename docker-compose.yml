services:
  flask_app:
    build: .
    restart: unless-stopped
    volumes:
      - ./data:/app/data

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"   # Standard HTTP
      - "443:443" # Standard HTTPS
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./certs:/etc/nginx/certs
    depends_on:
      - flask_app
    restart: unless-stopped