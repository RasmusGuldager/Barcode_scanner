<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAP-LAB Rental System</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body>

    <div class="container">
        <h1 style="text-align: center; color: white; margin-bottom: 20px;">VAP-LAB Equipment Rental</h1>

        <div id="view-menu" class="card">
            
            <div class="menu-section">
                <h2>Rent or Return Items</h2>
                <button onclick="startScanner('card')" class="btn-primary">📷 Scan AAU Card</button>
                <button onclick="showManualInput()" class="btn-secondary">Type e-mail (Non-AAU)</button>
            </div>

            <hr style="border: 1px solid #444; margin: 25px 0;">

            <div class="menu-section">
                <h2>Database</h2>
                <button onclick="window.location.href='/logs'" class="btn-secondary">View Rental Logs</button>
                <button onclick="window.location.href='/inventory'" class="btn-secondary">View Inventory</button>
            </div>

        </div>

        <div id="view-scanner" class="hidden">
            <div id="reader"></div>
            <button onclick="stopScanner()" class="btn-danger">Cancel</button>
        </div>

        <div id="view-manual" class="hidden">
            <input type="text" id="email-input" placeholder="Enter e-mail (e.g. example@student.aau.dk)">
            <button onclick="handleManualInput()" class="btn-success">Next</button>
            <button onclick="resetView()" class="btn-text">Back</button>
        </div>

        <div id="view-register" class="hidden">
            <h2 style="margin: 20px 0;">New User Registration</h2>
            <p style="margin-bottom: 20px;">Please register to continue.</p>
            
            <input type="text" id="reg-name" placeholder="Full Name">
            <input type="email" id="reg-email" placeholder="E-mail Address">
            
            <button onclick="completeRegistration()" class="btn-success">Save & Continue</button>
            <button onclick="resetView()" class="btn-text">Cancel</button>
        </div>

        <div id="view-action" class="hidden">
            <h3>Mail: <span id="display-action-mail">...</span></h3>
            <h2 style="margin: 20px 0;">What would you like to do?</h2>
            
            <button onclick="selectAction('rent')" class="btn-success" style="padding: 20px; font-size: 20px;">Rent Items</button>
            <button onclick="selectAction('return')" class="btn-primary" style="padding: 20px; font-size: 20px;">Return Items</button>
            
            <button onclick="resetView()" class="btn-text" style="margin-top: 20px;">Cancel</button>
        </div>

        <div id="view-form" class="hidden">
            <h3>Mail: <span id="display-mail">...</span></h3>
            
            <div style="text-align: left; background: #f8f9fa; color: #000; padding: 10px; border-radius: 5px; margin-bottom: 15px;">
                <strong>Items to Rent:</strong>
                <ul id="items-list" style="padding-left: 20px; margin-top: 5px;">
                    </ul>
            </div>

            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <input type="text" id="manual-item-input" placeholder="Type item name..." style="margin: 0;">
                <button onclick="addManualItem()" class="btn-secondary" style="margin: 0; width: 30%;">Add</button>
            </div>
            
            <button onclick="startScanner('item')" class="btn-primary">📷 Scan Item Barcode</button>
            
            <hr style="border: 1px solid #444; margin: 20px 0;">

            <button id="btn_submit" onclick="submitTransaction()" class="btn-success">Confirm</button>
            <button onclick="resetView()" class="btn-text">Cancel All</button>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
